worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/tools/nginx/nginx-1.28.2/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    charset utf-8;

    upstream legacy_php74_fcgi {
        server 127.0.0.1:9074;
        server 127.0.0.1:9075;
        server 127.0.0.1:9076;
        server 127.0.0.1:9077;
    }

    server {
        listen       8091;
        server_name  127.0.0.1 localhost;

        root   C:/Users/Administrator/Desktop/IDC/idccw-src/3.7.4/public;
        index  index.php index.html;

        location = /admin01 {
            return 301 /admin01/;
        }

        location = /admin01/ {
            try_files /admin01/index.html =404;
        }

        location ~* ^/(css|js|lang|img|fonts|media)/(.*)$ {
            try_files /admin01/$1/$2 =404;
        }

        location ^~ /admin01/ {
            try_files $uri $uri/ @thinkphp;
        }

        location / {
            try_files $uri $uri/ @thinkphp;
        }

        location @thinkphp {
            rewrite ^/(.*)$ /index.php?s=/$1 last;
        }

        location ~ \.php$ {
            include       C:/tools/nginx/nginx-1.28.2/conf/fastcgi_params;
            fastcgi_pass  legacy_php74_fcgi;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
            fastcgi_connect_timeout 30s;
            fastcgi_send_timeout 180s;
            fastcgi_read_timeout 180s;
        }

        location ~ /\. {
            deny all;
        }
    }
}
